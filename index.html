<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LEVISFX Pro - RSI Bot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }
 .container { max-width: 500px; margin: 0 auto; background: #1e293b; padding: 20px; border-radius: 12px; }
    h1 { color: #38bdf8; text-align: center; margin-bottom: 20px; font-size: 22px; }
 .input-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-size: 14px; color: #94a3b8; }
    input, select { width: 100%; padding: 10px; background: #334155; border: 1px solid #475569; border-radius: 6px; color: #e2e8f0; font-size: 16px; }
    button { width: 100%; padding: 12px; background: #38bdf8; color: #0f172a; border: none; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
    button:disabled { background: #475569; cursor: not-allowed; }
 .stop-btn { background: #ef4444; color: white; }
 .status { margin-top: 15px; padding: 10px; background: #334155; border-radius: 6px; font-size: 14px; }
 .log { margin-top: 15px; background: #0f172a; padding: 10px; border-radius: 6px; height: 200px; overflow-y: auto; font-family: monospace; font-size: 12px; }
 .win { color: #4ade80; }
 .loss { color: #f87171; }
 .info { color: #60a5fa; }
  </style>
</head>
<body>
  <div class="container">
    <h1>LEVISFX Pro - RSI</h1>
    <div class="input-group">
      <label>API Token</label>
      <input type="text" id="token" placeholder="Paste Deriv API Token">
    </div>
    <div class="input-group">
      <label>Stake ($)</label>
      <input type="number" id="stake" value="1" step="0.01">
    </div>
    <div class="input-group">
      <label>Duration (ticks)</label>
      <input type="number" id="duration" value="5">
    </div>
    <div class="input-group">
      <label>Volatility Index</label>
      <select id="symbol">
        <option value="R_10">Volatility 10 Index</option>
        <option value="R_25">Volatility 25 Index</option>
        <option value="R_50">Volatility 50 Index</option>
        <option value="R_75">Volatility 75 Index</option>
        <option value="R_100">Volatility 100 Index</option>
      </select>
    </div>
    <div class="input-group">
      <label>Strategy</label>
      <select id="strategy">
        <option value="RSI">RSI Overbought/Oversold</option>
        <option value="EVENODD">Even/Odd</option>
      </select>
    </div>
    <button id="startBtn" onclick="startBot()">Start Bot</button>
    <button class="stop-btn" id="stopBtn" onclick="stopBot()" disabled>Stop Bot</button>
    <div class="status">
      Status: <span id="status">Idle</span><br>
      Balance: $<span id="balance">0.00</span> | 
      P/L: $<span id="pl">0.00</span>
    </div>
    <div class="log" id="log"></div>
  </div>
  <script>
    let ws, isRunning = false, ticks = [], initialBalance = 0, currentBalance = 0;
    let stake, duration, symbol, strategy, token;
    function log(msg, type = 'info') {
      const logDiv = document.getElementById('log');
      const time = new Date().toLocaleTimeString();
      logDiv.innerHTML += `<div class="${type}">[${time}] ${msg}</div>`;
      logDiv.scrollTop = logDiv.scrollHeight;
    }
    function updateStatus(text) { document.getElementById('status').textContent = text; }
    function updateBalance(bal) { 
      currentBalance = bal;
      document.getElementById('balance').textContent = bal.toFixed(2);
      document.getElementById('pl').textContent = (bal - initialBalance).toFixed(2);
    }
    function calculateRSI(prices, period = 14) {
      if (prices.length < period + 1) return 50;
      let gains = 0, losses = 0;
      for (let i = prices.length - period; i < prices.length; i++) {
        const diff = prices[i] - prices[i-1];
        if (diff > 0) gains += diff;
        else losses -= diff;
      }
      const avgGain = gains / period;
      const avgLoss = losses / period;
      if (avgLoss === 0) return 100;
      const rs = avgGain / avgLoss;
      return 100 - (100 / (1 + rs));
    }
    function startBot() {
      token = document.getElementById('token').value.trim();
      stake = parseFloat(document.getElementById('stake').value);
      duration = parseInt(document.getElementById('duration').value);
      symbol = document.getElementById('symbol').value;
      strategy = document.getElementById('strategy').value;
      if (!token) return alert('Enter API Token');
      if (!stake || stake < 0.35) return alert('Min stake is $0.35');
      document.getElementById('startBtn').disabled = true;
      document.getElementById('stopBtn').disabled = false;
      isRunning = true;
      ticks = [];
      updateStatus('Connecting...');
      log('Starting LEVISFX Pro...', 'info');
      ws = new WebSocket('wss://ws.derivws.com/websockets/v3?app_id=1089');
      ws.onopen = () => {
        log('Connected to Deriv', 'info');
        ws.send(JSON.stringify({ authorize: token }));
      };
      ws.onmessage = (msg) => {
        const data = JSON.parse(msg.data);
        if (data.error) {
          log('Error: ' + data.error.message, 'loss');
          stopBot();
          return;
        }
        if (data.authorize) {
          log('Logged in: ' + data.authorize.loginid, 'win');
          initialBalance = data.authorize.balance;
          updateBalance(initialBalance);
          ws.send(JSON.stringify({ balance: 1, subscribe: 1 }));
          ws.send(JSON.stringify({ ticks: symbol, subscribe: 1 }));
          updateStatus('Analyzing market...');
        }
        if (data.balance) updateBalance(data.balance.balance);
        if (data.tick && isRunning) {
          ticks.push(data.tick.quote);
          if (ticks.length > 100) ticks.shift();
          if (ticks.length >= 20) {
            const rsi = calculateRSI(ticks);
            const lastDigit = Math.floor(data.tick.quote * 100) % 10;
            if (strategy === 'RSI') {
              if (rsi < 30) {
                log(`RSI: ${rsi.toFixed(1)} Oversold → BUY RISE`, 'info');
                placeTrade('CALL');
              } else if (rsi > 70) {
                log(`RSI: ${rsi.toFixed(1)} Overbought → BUY FALL`, 'info');
                placeTrade('PUT');
              }
            } else if (strategy === 'EVENODD') {
              const contract = lastDigit % 2 === 0? 'DIGITEVEN' : 'DIGITODD';
              log(`Last digit: ${lastDigit} → ${contract}`, 'info');
              placeTrade(contract);
            }
          }
        }
        if (data.buy) log(`Trade placed: ${data.buy.contract_id}`, 'info');
        if (data.proposal_open_contract) {
          if (data.proposal_open_contract.is_sold) {
            const profit = data.proposal_open_contract.profit;
            if (profit > 0) log(`WIN: +$${profit.toFixed(2)}`, 'win');
            else log(`LOSS: $${profit.toFixed(2)}`, 'loss');
          }
        }
      };
      ws.onerror = () => { log('Connection error', 'loss'); stopBot(); };
      ws.onclose = () => { log('Disconnected', 'info'); stopBot(); };
    }
    function placeTrade(contract_type) {
      if (!isRunning) return;
      isRunning = false;
      setTimeout(() => { if (document.getElementById('stopBtn').disabled === false) isRunning = true; }, 3000);
      ws.send(JSON.stringify({
        buy: 1,
        price: stake,
        parameters: {
          amount: stake,
          basis: 'stake',
          contract_type: contract_type,
          currency: 'USD',
          duration: duration,
          duration_unit: 't',
          symbol: symbol
        }
      }));
    }
    function stopBot() {
      isRunning = false;
      if (ws) ws.close();
      document.getElementById('startBtn').disabled = false;
      document.getElementById('stopBtn').disabled = true;
      updateStatus('Stopped');
      log('Bot stopped', 'info');
    }
  </script>
</body>
</html>
